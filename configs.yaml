audio:
  sampling_rate: 16000
  mono: true

contentvec:
  model_id: lengyue233/content-vec-best
  hidden_size: 768
  stride_samples: 320
  frame_rate: 50

speaker:
  model_id: speechbrain/spkrec-ecapa-voxceleb

mel:
  n_mels: 80
  n_fft: 1024
  win_length: 1024
  hop_length: 320
  f_min: 0
  f_max: 8000
  power: 1.0
  log_min: 1.0e-5

dataset:
  vctk_root: datasets/vctk/wav48_silence_trimmed
  mic: mic1
  split:
    train: 0.8
    val: 0.1
    test: 0.1
    seed: 1234
    split_by: speaker

precomputed:
  content_latent_dir: datasets/precomputed/contents
  speaker_latent_dir: datasets/precomputed/speakers
  mel_dir: datasets/precomputed/mels

training:
  smoke_test_training: true
  batch_size: 16
  num_epochs: 5
  learning_rate: 0.001
  weight_decay: 0.0001
  save_interval: 10
  model_checkpoint_dir: model_checkpoints/