dataset:
  vctk_root: datasets/vctk/wav48_silence_trimmed
  mic: mic1

precomputed:
  content_latent_dir: datasets/precomputed/contents
  speaker_latent_dir: datasets/precomputed/speakers
  mel_dir: datasets/precomputed/mels
