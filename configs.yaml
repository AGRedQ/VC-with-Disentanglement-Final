audio:
  sampling_rate: 16000
  mono: true

contentvec:
  model_id: lengyue233/content-vec-best
  hidden_size: 768
  stride_samples: 320
  frame_rate: 50

speaker:
  model_id: speechbrain/spkrec-ecapa-voxceleb

